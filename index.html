<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算术小冒险</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; overflow: hidden; height: 100vh; background: #ffecd2; }

        /* ===== PAGES ===== */
        .page { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* ===== HOME ===== */
        #home { background: linear-gradient(180deg, #a8edea 0%, #fed6e3 50%, #ffecd2 100%); }
        .home-title {
            font-size: 3.5rem; font-weight: 900; color: #ff6b6b;
            text-shadow: 3px 3px 0 #fff, 5px 5px 0 rgba(0,0,0,0.1);
            margin-bottom: 10px; animation: bounceTitle 2s ease-in-out infinite;
        }
        .home-subtitle { font-size: 1.3rem; color: #666; margin-bottom: 40px; }
        @keyframes bounceTitle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .mascot { width: 150px; height: 150px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-20px) rotate(3deg); } }
        .star {
            position: absolute; width: 20px; height: 20px; background: rgba(255,255,255,0.6);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: twinkle 2s ease-in-out infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

        .practice-options { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; }
        .practice-card {
            width: 200px; height: 230px; border: none; border-radius: 25px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1.1rem; color: #fff;
            transition: all 0.3s; box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .practice-card:hover { transform: translateY(-8px) scale(1.05); }
        .practice-card.mix { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
        .practice-card.mul { background: linear-gradient(135deg, #fccb90, #d57eeb); }
        .practice-card .card-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .practice-card .card-desc { font-size: 0.8rem; font-weight: 400; opacity: 0.9; margin-top: 5px; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* Feedback */
        .feedback { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; z-index: 100; pointer-events: none; }
        .feedback.show { display: flex; }
        .feedback-content { font-size: 5rem; animation: popIn 0.6s ease-out; }
        @keyframes popIn { 0% { transform: scale(0) rotate(-20deg); opacity: 0; } 60% { transform: scale(1.3) rotate(5deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }

        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }


        /* ===== SHARED GAME UI ===== */
        .back-btn {
            position: absolute; top: 15px; left: 15px; width: 50px; height: 50px; border: none; border-radius: 50%;
            background: rgba(255,255,255,0.8); font-size: 1.5rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1); z-index: 9999;
            padding: 0; margin: 0;
        }
        .back-btn::after {
            content: ''; position: absolute;
            top: -75px; left: -75px; width: 200px; height: 200px;
            border-radius: 50%; cursor: pointer;
        }
        .back-btn:hover { transform: scale(1.1); background: white; }
        .game-page { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        .game-hud { position: absolute; top: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 10; padding: 0 80px; }
        .hud-bar { background: rgba(0,0,0,0.5); border-radius: 20px; padding: 10px 30px; display: flex; gap: 30px; color: white; font-weight: 700; font-size: 1rem; }
        .hud-item { display: flex; align-items: center; gap: 8px; }
        .game-question {
            position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.92); border-radius: 14px; padding: 5px 12px;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 18px rgba(0,0,0,0.16); z-index: 20;
        }
        .game-q-text { font-size: 1.15rem; font-weight: 900; color: #333; }
        .game-q-input { width: 80px; height: 55px; font-size: 2rem; font-weight: 900; font-family: 'Nunito', sans-serif; text-align: center; border: 3px solid #ddd; border-radius: 15px; outline: none; }
        .game-q-input:focus { border-color: #667eea; }
        .game-q-input.correct { border-color: #43e97b; background: #f0fff4; }
        .game-q-input.wrong { border-color: #ff6b6b; background: #fff5f5; animation: shake 0.5s; }
        .game-q-btn { width: 55px; height: 55px; border: none; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-size: 1.5rem; cursor: pointer; transition: all 0.3s; }
        .game-q-btn:hover { transform: scale(1.1); }
        /* 答案选项 (点选, 替代数字输入, iPad 友好) */
        .sea-options { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; }
        .sea-opt {
            min-width: 42px; height: 38px; padding: 0 8px;
            font-size: 1.15rem; font-weight: 900; font-family: 'Nunito', sans-serif;
            border: 2px solid #cdd6e8; border-radius: 10px; background: #fff; color: #333;
            cursor: pointer; transition: transform 0.1s, background 0.2s, border-color 0.2s;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        .sea-opt:hover { border-color: #667eea; }
        .sea-opt:active { transform: scale(0.93); }
        .sea-opt.correct { background: #43e97b; border-color: #2bbf63; color: #fff; }
        .sea-opt.wrong { background: #ff6b6b; border-color: #e23e3e; color: #fff; animation: shake 0.4s; }
        .sea-opt.disabled { pointer-events: none; opacity: 0.9; }


        /* ===== UNDER THE SEA ===== */
        #sea-game {
            background: #0a3d62;
            background-image: url('picture/underthesea/海底backgroup.png');
            background-size: cover;
            background-position: center;
        }
        #sea-game.active { display: block; }
        .sea-scene { position: absolute; width: 100%; height: 100%; overflow: hidden; }

        /* Swimming creatures */
        .sea-creature {
            position: absolute;
            transition: opacity 0.3s;
        }
        .sea-creature img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }
        /* Fish facing LEFT in image -> swim left (right to left) */
        .sea-swim-left {
            animation: swimLeft linear infinite;
        }
        @keyframes swimLeft {
            0% { transform: translateX(calc(100vw + 80px)) translateY(0); }
            20% { transform: translateX(calc(80vw)) translateY(-12px); }
            40% { transform: translateX(calc(55vw)) translateY(8px); }
            60% { transform: translateX(calc(35vw)) translateY(-10px); }
            80% { transform: translateX(calc(15vw)) translateY(6px); }
            100% { transform: translateX(-180px) translateY(0); }
        }
        /* Fish facing RIGHT in image -> swim right (left to right) */
        .sea-swim-right {
            animation: swimRight linear infinite;
        }
        @keyframes swimRight {
            0% { transform: translateX(-180px) translateY(0); }
            20% { transform: translateX(calc(15vw)) translateY(10px); }
            40% { transform: translateX(calc(35vw)) translateY(-12px); }
            60% { transform: translateX(calc(55vw)) translateY(8px); }
            80% { transform: translateX(calc(80vw)) translateY(-8px); }
            100% { transform: translateX(calc(100vw + 80px)) translateY(0); }
        }
        /* Seahorse: vertical drift + slow horizontal */
        .sea-seahorse {
            animation: seahorseDrift linear infinite;
        }
        @keyframes seahorseDrift {
            0% { transform: translateX(calc(100vw + 60px)) translateY(0); }
            15% { transform: translateX(calc(82vw)) translateY(-20px); }
            30% { transform: translateX(calc(65vw)) translateY(8px); }
            45% { transform: translateX(calc(50vw)) translateY(-25px); }
            60% { transform: translateX(calc(35vw)) translateY(5px); }
            75% { transform: translateX(calc(20vw)) translateY(-18px); }
            100% { transform: translateX(-60px) translateY(0); }
        }
        /* Seabed crawl: octopus & mermaid stay near bottom */
        .sea-floor-creature {
            position: absolute;
        }
        .sea-floor-creature img {
            height: 100%;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
        .sea-crawl-right {
            animation: crawlRight ease-in-out infinite alternate;
        }
        @keyframes crawlRight {
            0% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(15vw) translateY(-20px); }
            50% { transform: translateX(25vw) translateY(10px); }
            75% { transform: translateX(35vw) translateY(-15px); }
            100% { transform: translateX(40vw) translateY(0); }
        }
        .sea-crawl-left {
            animation: crawlLeft ease-in-out infinite alternate;
        }
        @keyframes crawlLeft {
            0% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(-12vw) translateY(-18px); }
            50% { transform: translateX(-22vw) translateY(8px); }
            75% { transform: translateX(-30vw) translateY(-12px); }
            100% { transform: translateX(-38vw) translateY(0); }
        }
        .sea-crawl-wander {
            animation: crawlWander ease-in-out infinite;
        }
        @keyframes crawlWander {
            0% { transform: translateX(0) translateY(0); }
            20% { transform: translateX(12vw) translateY(-25px); }
            40% { transform: translateX(5vw) translateY(15px); }
            60% { transform: translateX(-10vw) translateY(-20px); }
            80% { transform: translateX(-5vw) translateY(10px); }
            100% { transform: translateX(0) translateY(0); }
        }

        /* Floor treasures */
        .sea-floor-item {
            position: absolute;
            bottom: 30px;
            animation: gentleBob 3s ease-in-out infinite;
            cursor: default;
        }
        .sea-floor-item img {
            height: 100%;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        @keyframes gentleBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Treasure box button */
        .treasure-box-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            border: none;
            background: none;
            cursor: pointer;
            z-index: 15;
            transition: transform 0.3s;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4));
        }
        .treasure-box-btn:hover { transform: scale(1.15); }
        .treasure-box-btn img { width: 100%; height: 100%; object-fit: contain; }
        .treasure-box-count {
            position: absolute;
            top: -5px; right: -5px;
            background: #ff6b6b;
            color: white;
            width: 28px; height: 28px;
            border-radius: 50%;
            font-size: 0.85rem;
            font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        /* Bubbles */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
            border: 1px solid rgba(255,255,255,0.2);
            animation: bubbleRise linear infinite;
        }
        @keyframes bubbleRise {
            0% { transform: translateY(0) translateX(0); opacity: 0.7; }
            50% { transform: translateY(-40vh) translateX(15px); opacity: 0.5; }
            100% { transform: translateY(-85vh) translateX(-10px); opacity: 0; }
        }

        /* Magic animal: full-screen slow wander (excluding bottom 15%) */
        .sea-magic-wander {
            animation: magicWander ease-in-out infinite;
        }
        @keyframes magicWander {
            0%  { transform: translate(0, 0); }
            15% { transform: translate(15vw, -12vh); }
            30% { transform: translate(-8vw, -25vh); }
            45% { transform: translate(20vw, -35vh); }
            60% { transform: translate(-5vw, -15vh); }
            75% { transform: translate(10vw, -40vh); }
            100%{ transform: translate(0, 0); }
        }

        /* === UNDERWATER LIGHT SYSTEM (4 layers) === */
        /* Layer 1: God Rays - 5 beams from surface */
        .sea-godray-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        .sea-godray {
            position: absolute; top: -20%; height: 120%;
            background: linear-gradient(180deg, rgba(255,255,200,0.35) 0%, rgba(255,255,200,0.15) 20%, rgba(173,220,255,0.08) 50%, transparent 80%);
            transform-origin: top center; filter: blur(15px);
        }
        .sea-godray:nth-child(1) { left: 3%; width: 22%; animation: seaRay1 7s ease-in-out infinite; }
        .sea-godray:nth-child(2) { left: 20%; width: 15%; animation: seaRay2 9s ease-in-out 1s infinite; }
        .sea-godray:nth-child(3) { left: 38%; width: 25%; animation: seaRay1 8s ease-in-out 2s infinite; }
        .sea-godray:nth-child(4) { left: 58%; width: 18%; animation: seaRay2 6s ease-in-out 0.5s infinite; }
        .sea-godray:nth-child(5) { left: 75%; width: 20%; animation: seaRay1 10s ease-in-out 3s infinite; }
        @keyframes seaRay1 {
            0%  { transform: rotate(-6deg) scaleX(0.8); opacity: 0.2; }
            30% { transform: rotate(8deg) scaleX(1.3); opacity: 1; }
            60% { transform: rotate(-2deg) scaleX(1); opacity: 0.4; }
            100%{ transform: rotate(-6deg) scaleX(0.8); opacity: 0.2; }
        }
        @keyframes seaRay2 {
            0%  { transform: rotate(7deg) scaleX(1.2); opacity: 0.3; }
            40% { transform: rotate(-8deg) scaleX(0.7); opacity: 0.9; }
            70% { transform: rotate(5deg) scaleX(1.4); opacity: 1; }
            100%{ transform: rotate(7deg) scaleX(1.2); opacity: 0.3; }
        }
        /* Layer 2: Canvas Caustics (rendered via JS) */
        .sea-caustic-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; }
        /* Layer 3: Moving light hotspot */
        .sea-hotspot {
            position: absolute; z-index: 4; pointer-events: none;
            width: 60vw; height: 50vh; top: -5%;
            background: radial-gradient(ellipse at center, rgba(255,255,220,0.25) 0%, rgba(255,255,220,0.08) 40%, transparent 70%);
            filter: blur(30px);
            animation: seaHotMove 12s ease-in-out infinite;
        }
        @keyframes seaHotMove {
            0%  { left: -10%; opacity: 0.5; transform: scale(1); }
            25% { left: 15%; opacity: 1; transform: scale(1.2); }
            50% { left: 40%; opacity: 0.6; transform: scale(0.9); }
            75% { left: 25%; opacity: 1; transform: scale(1.3); }
            100%{ left: -10%; opacity: 0.5; transform: scale(1); }
        }
        /* Layer 4: Floating light particles */
        .sea-light-particle {
            position: absolute; border-radius: 50%; pointer-events: none;
            background: radial-gradient(circle, rgba(255,255,255,0.9), transparent 70%);
        }
        @keyframes seaParticleFloat {
            0%  { opacity: 0; transform: translate(0, 0); }
            20% { opacity: 0.8; }
            100%{ opacity: 0; transform: translate(var(--pdx), -55vh); }
        }

        /* ===== COLLECTIBLE MODE: clickable creatures/treasures ===== */
        .sea-collectible {
            cursor: pointer !important;
            filter: drop-shadow(0 0 12px rgba(255,215,0,0.6)) !important;
            animation-play-state: paused !important;
        }
        .sea-collectible:hover {
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.9)) brightness(1.15) !important;
            transform: scale(1.1);
        }
        .sea-pick-hint {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,20,60,0.7); color: #FFD700;
            font-size: 1.4rem; font-weight: 900; padding: 12px 30px;
            border-radius: 20px; pointer-events: none; z-index: 25;
            animation: bounceTitle 1.5s ease-in-out infinite;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            white-space: nowrap;
        }
        /* Frozen (thawed/unfrozen) items - can't be picked */
        .sea-thawed {
            filter: brightness(0.5) saturate(0.3) !important;
            cursor: default !important;
            pointer-events: none !important;
            opacity: 0.5 !important;
            transition: filter 0.6s, opacity 0.6s;
        }
        /* Countdown timer - number overlaid on starfish white sign */
        .sea-timer {
            position: absolute; top: 65px; left: 10px; z-index: 30;
            width: 160px; height: 160px;
            user-select: none;
        }
        .sea-timer img {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
        }
        .sea-timer-num {
            position: absolute;
            /* White sign: center 50%,60% of image, size 74%x26% */
            top: 48%; left: 14%;
            width: 73%; height: 25%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: 900;
            color: #e67e22;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
            letter-spacing: 2px;
        }
        .sea-timer.warning .sea-timer-num {
            color: #ff3333;
            animation: timerPulse 0.5s ease-in-out infinite alternate;
        }
        .sea-timer.warning img {
            animation: timerShake 0.4s ease-in-out infinite alternate;
        }
        @keyframes timerPulse {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }
        @keyframes timerShake {
            from { transform: rotate(-5deg); }
            to { transform: rotate(5deg); }
        }
        /* Lost item big display */
        .lost-item-big {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 350; pointer-events: none;
            animation: lostFadeOut 2.5s ease-out forwards;
        }
        .lost-item-big img { width: 120px; height: 120px; object-fit: contain; filter: drop-shadow(0 0 20px rgba(255,0,0,0.5)); }
        .lost-item-big .lost-text { color: #ff6b6b; font-size: 1.5rem; font-weight: 900; margin-top: 10px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
        @keyframes lostFadeOut {
            0% { opacity: 1; transform: scale(1); }
            70% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(0.5) translateY(-50px); }
        }
        /* No text selection in game */
        #sea-game { user-select: none; -webkit-user-select: none; }
        .treasure-modal-card { user-select: none; -webkit-user-select: none; }
        /* Fly-to-box animation */
        .fly-to-box {
            position: fixed; z-index: 350; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .fly-to-box img { width: 60px; height: 60px; object-fit: contain; }
        .fly-to-box.flying { transform: scale(0.4); opacity: 0.6; }

        /* ===== TREASURE BOX MODAL ===== */
        .treasure-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,15,40,0.85); display: none;
            align-items: center; justify-content: center; z-index: 400;
        }
        .treasure-modal.show { display: flex; }
        .treasure-modal-card {
            background: linear-gradient(180deg, #1a3a5c, #0d2137);
            border: 3px solid rgba(255,215,0,0.4);
            border-radius: 30px; padding: 18px 22px; text-align: center;
            max-width: 550px; width: 92%; max-height: 70vh;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); animation: slideUp 0.4s ease-out;
            overflow-y: auto;
        }
        .treasure-modal-title {
            color: #FFD700; font-size: 1.6rem; font-weight: 900; margin-bottom: 5px;
        }
        .treasure-modal-subtitle { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 20px; }
        .treasure-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; margin-bottom: 20px;
        }
        .treasure-grid-item {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 10px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100px;
            transition: all 0.3s;
        }
        .treasure-grid-item:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,215,0,0.4); }
        .treasure-grid-item img { width: 60px; height: 60px; object-fit: contain; }
        .treasure-grid-item .item-label { color: rgba(255,255,255,0.7); font-size: 0.7rem; margin-top: 5px; }
        .treasure-grid-item .item-count { color: #FFD700; font-size: 0.75rem; font-weight: 700; }
        .treasure-empty {
            color: rgba(255,255,255,0.4); font-size: 1.1rem; padding: 40px 0;
        }
        .treasure-close-btn {
            padding: 12px 35px; border: none; border-radius: 20px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #333; font-family: 'Nunito', sans-serif; font-weight: 700;
            font-size: 1rem; cursor: pointer; transition: all 0.3s;
        }
        .treasure-close-btn:hover { transform: translateY(-3px); }
        .sell-btn {
            padding: 4px 10px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: white;
            font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.7rem;
            cursor: pointer; transition: all 0.2s; margin-top: 4px;
        }
        .sell-btn:hover { transform: scale(1.1); }
        .item-price { color: #4CAF50; font-size: 0.75rem; font-weight: 700; }
        /* Invest styles */
        .stock-card {

// ===== QUESTION GENERATION =====
// Question generation with carry/borrow tracking
// carry: 5+8=13 (ones digit sum >= 10). borrow: 12-3=9 (ones digit of a < ones digit of b)
function generateQuestion(type, forceCarry) {
    let a, b, op, answer, hasCarry = false;
    if (type === 'mul') {
        a = Math.floor(Math.random() * 4) + 1; b = Math.floor(Math.random() * 9) + 1;
        op = '\u00d7'; answer = a * b;
    } else if (type === 'add' || (type === 'mix' && Math.random() < 0.5)) {
        if (forceCarry) {
            // Force carry: ones digits sum >= 10
            const a1 = Math.floor(Math.random() * 9) + 2; // ones digit of a: 2-9 (so we can find b1)
            const b1min = Math.max(1, 10 - a1); // minimum b ones digit to force carry
            const b1 = b1min + Math.floor(Math.random() * (10 - b1min));
            // a can be a1 or 10+a1 (keep sum <= 20)
            a = (Math.random() < 0.4 && a1 + b1 <= 20) ? a1 : 10 + (a1 % 10);
            b = b1;
            if (a + b > 20) { a = a1; b = b1; }
            if (a + b > 20) b = 20 - a; // safety
            hasCarry = true;
        } else {
            // No carry: ones digits sum < 10
            a = Math.floor(Math.random() * 18) + 2;
            b = Math.floor(Math.random() * (20 - a)) + 1;
            if ((a % 10) + (b % 10) >= 10 && !forceCarry) {
                // Adjust to avoid carry
                b = Math.min(b, 9 - (a % 10));
                if (b <= 0) b = 1;
            }
            hasCarry = (a % 10) + (b % 10) >= 10;
        }
        op = '+'; answer = a + b;
    } else {
        // Subtraction
        if (forceCarry) {
            // Force borrow: ones digit of a < ones digit of b
            a = 10 + Math.floor(Math.random() * 10); // 10-19
            const a1 = a % 10;
            const b1min = a1 + 1; // b ones digit > a ones digit
            if (b1min > 9) { a = 10 + Math.floor(Math.random() * 9); }
            const a1f = a % 10;
            const b1 = Math.min(9, a1f + 1 + Math.floor(Math.random() * (9 - a1f)));
            b = b1;
            if (b >= a) b = a - 1;
            if (b <= 0) b = 1;
            hasCarry = (a % 10) < (b % 10);
        } else {
            a = Math.floor(Math.random() * 19) + 2;
            b = Math.floor(Math.random() * a) + 1;
            if ((a % 10) < (b % 10) && !forceCarry) {
                b = Math.min(b, a % 10);
                if (b <= 0) b = 1;
            }
            hasCarry = (a % 10) < (b % 10);
        }
        op = '-'; answer = a - b;
    }
    return { a, b, op, answer, text: `${a} ${op} ${b}`, hasCarry };
}

// Generate with 70% carry/borrow ratio for mix type
function generateSeaQuestion() {
    const wantCarry = Math.random() < 0.7;
    if (adventureType === 'mul') return generateQuestion('mul');
    return generateQuestion('mix', wantCarry);
}

// 生成 5 个相近的备选答案(含正确答案), 位置随机。
// 个位数答案 → 备选也都是个位数; 多位数答案 → 5 个连续相近数。
function makeAnswerOptions(ans) {
    const single = ans <= 9;
    const minV = 0;
    const maxV = single ? 9 : ans + 6;
    const off = Math.floor(Math.random() * 5); // 0-4: 让正确答案在窗口里的位置随机
    let start = ans - off;
    if (start < minV) start = minV;
    if (start + 4 > maxV) start = maxV - 4;
    if (start < minV) start = minV;
    const opts = [];
    for (let i = 0; i < 5; i++) opts.push(start + i);
    return shuffle(opts); // 显示顺序也打乱
}

function randRange(min, max) { return min + Math.random() * (max - min); }

// Shuffle array in place
function shuffle(arr) { for (let i = arr.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

function createSwimmer(item, container, delay) {
    const div = document.createElement('div');
    div.className = 'sea-creature';
    div.dataset.itemId = item.id;
    div.dataset.itemName = item.name;
    div.dataset.itemImg = item.img;
    const size = Math.round(randRange(item.sizeRange[0], item.sizeRange[1]));
    div.style.height = size + 'px';
    const tr = item.topRange || [20, 55];
    div.style.top = randRange(tr[0], tr[1]) + '%';
    const dur = randRange(item.speed[0], item.speed[1]);
    div.style.animationDuration = dur + 's';
    div.style.animationDelay = (delay || 0) + 's';

    // Determine swim direction based on facing
    let swimDir; // 'left' or 'right' = actual movement direction
    if (item.type === 'seahorse' || item.type === 'jellyfish') {
        div.classList.add('sea-seahorse');
        swimDir = 'left'; // seahorse drifts left
    } else if (item.facing === 'left') {
        div.classList.add('sea-swim-left');
        swimDir = 'left';
    } else if (item.facing === 'right') {
        div.classList.add('sea-swim-right');
        swimDir = 'right';
    } else {
        // front-facing: pick random direction, flip image to match
        swimDir = Math.random() > 0.5 ? 'left' : 'right';
        div.classList.add(swimDir === 'left' ? 'sea-swim-left' : 'sea-swim-right');
    }

    const img = document.createElement('img');
    img.src = IMG + item.img;
    img.alt = item.name;
    // Always ensure image faces the swim direction:
    // swimLeft = creature should face left. swimRight = face right.
    // If native facing doesn't match swim direction, flip the image.
    const needsFlip =
        (item.facing === 'left' && swimDir === 'right') ||
        (item.facing === 'right' && swimDir === 'left') ||
        (item.facing === 'front' && swimDir === 'right'); // most 'front' imgs lean slightly left
    if (needsFlip) img.style.transform = 'scaleX(-1)';

    div.appendChild(img);
    container.appendChild(div);
    return { el: div, dur };
}

function createFloorCreature(item, container) {
    const div = document.createElement('div');
    div.className = 'sea-floor-creature';
    div.dataset.itemId = item.id;
    div.dataset.itemName = item.name;
    div.dataset.itemImg = item.img;
    const size = Math.round(randRange(item.sizeRange[0], item.sizeRange[1]));
    div.style.height = size + 'px';
    const dur = randRange(item.speed[0], item.speed[1]);
    div.style.animationDuration = dur + 's';

    const qAreaH = 120;
    const isMagic = MAGIC_IDS.includes(item.id);

    if (isMagic) {
        // Magic animals: full screen wander (excluding question area), slower speed
        div.classList.add('sea-magic-wander');
        div.style.animationDuration = (dur * 1.25) + 's'; // 80% of original speed = 125% duration
        div.style.left = (10 + Math.random() * 60) + '%';
        div.style.bottom = (qAreaH + 20 + Math.random() * Math.round(window.innerHeight * 0.55)) + 'px';
    } else if (item.id === 'mermaid') {
        const crawlDir = ['sea-crawl-right', 'sea-crawl-left', 'sea-crawl-wander'][Math.floor(Math.random() * 3)];
        div.classList.add(crawlDir);
        div.style.left = (5 + Math.random() * 55) + '%';
        div.style.bottom = (qAreaH + 10 + Math.random() * Math.round(window.innerHeight * 0.18)) + 'px';
    } else {
        const crawlDir = ['sea-crawl-wander', 'sea-crawl-right', 'sea-crawl-left'][Math.floor(Math.random() * 3)];
        div.classList.add(crawlDir);
        const side = Math.random() > 0.5;
        div.style.left = side ? (5 + Math.random() * 25) + '%' : (65 + Math.random() * 25) + '%';
        div.style.bottom = (qAreaH + Math.random() * 60) + 'px';
    }

    // Flip image to match crawl direction
    const img = document.createElement('img');
    img.src = IMG + item.img;
    img.alt = item.name;
    const movesLeft = div.classList.contains('sea-crawl-left');
    const movesRight = div.classList.contains('sea-crawl-right');
    if (item.facing === 'right' && movesLeft) img.style.transform = 'scaleX(-1)';
    if (item.facing === 'left' && movesRight) img.style.transform = 'scaleX(-1)';

    div.style.animationDelay = (Math.random() * 3) + 's';
    div.appendChild(img);
    container.appendChild(div);
}

const MAX_TREASURES_ON_SCREEN = 5;
let treasureRefillTimer = null;

// Shuffle queue with value-based cooldown
// After a high-value item is collected, it goes on cooldown before it can reappear
let treasureQueue = [];
let treasureCooldowns = {}; // { itemId: timestamp when available again }

function nextTreasureFromQueue() {
    const now = Date.now();
    // Rebuild queue excluding items on cooldown
    if (treasureQueue.length === 0) {
        const available = SEA_TREASURES.filter(t => {
            const cd = treasureCooldowns[t.id];
            return !cd || now >= cd;
        });
        if (available.length === 0) {
            // All on cooldown - just pick from full list
            treasureQueue = shuffle([...SEA_TREASURES]);
        } else {
            treasureQueue = shuffle([...available]);
        }
    }
    return treasureQueue.pop();
}

// When an item is collected, set a cooldown based on its max price
// Higher value = longer cooldown before reappearing
function setTreasureCooldown(itemId) {
    const range = PRICE_TABLE[itemId] || DEFAULT_PRICE;
    const maxPrice = range[1];
    // Cooldown: maxPrice * 3 seconds (e.g. $13 item = 39s, $2 item = 6s)
    const cooldownMs = maxPrice * 300; // e.g. $180 item = 54s cooldown
    treasureCooldowns[itemId] = Date.now() + cooldownMs;
    // Also remove from current queue so it won't appear immediately
    treasureQueue = treasureQueue.filter(t => t.id !== itemId);
}

function spawnTreasure(container) {
    const item = nextTreasureFromQueue();
    if (!item) return;
    // Pick an unused position
    const usedPositions = new Set();
    container.querySelectorAll('.sea-floor-item').forEach(el => {
        usedPositions.add(el.style.left + '|' + el.style.bottom);
    });
    const available = TREASURE_SPOTS.filter(p => !usedPositions.has(p.left + '|' + p.bottom));
    if (available.length === 0) return;
    const pos = available[Math.floor(Math.random() * available.length)];

    const div = document.createElement('div');
    div.className = 'sea-floor-item';
    div.dataset.itemId = item.id;
    div.dataset.itemName = item.name;
    div.dataset.itemImg = item.img;
    // Trident (treasure2, ts*_2 pattern) gets 3x size, others 2x
    const isTrident = item.id.endsWith('_2') || item.id === 'treasure2';
    const baseSz = 50 + Math.random() * 20; // 50-70px
    const sz = isTrident ? baseSz * 1.5 : baseSz;
    div.style.height = sz + 'px';
    div.style.left = pos.left;
    div.style.bottom = pos.bottom;
    div.style.animationDelay = (Math.random() * 2) + 's';
    div.style.opacity = '0';
    div.style.transition = 'opacity 1s';
    const img = document.createElement('img');
    img.src = IMG + item.img; img.alt = item.name;
    div.appendChild(img); container.appendChild(div);
    requestAnimationFrame(() => { div.style.opacity = '1'; });
}

function refillTreasures() {
    const fc = document.getElementById('seaFloorContainer');
    if (!fc) return;
    const current = fc.querySelectorAll('.sea-floor-item').length;
    const needed = MAX_TREASURES_ON_SCREEN - current;
    for (let i = 0; i < needed; i++) {
        spawnTreasure(fc);
    }
}

// Canvas-based caustic light rendering
let causticAnimId = null;
function initCaustics() {
    if (causticAnimId) cancelAnimationFrame(causticAnimId);
    const canvas = document.getElementById('seaCausticCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let t = 0;
    function drawCaustics() {
        if (currentPage !== 'sea-game') { causticAnimId = null; return; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        t += 0.008;
        ctx.globalCompositeOperation = 'lighter';
        const cs = 120;
        for (let x = -cs; x < canvas.width + cs; x += cs * 0.6) {
            for (let y = -cs; y < canvas.height + cs; y += cs * 0.6) {
                const ox = Math.sin(t + x * 0.005 + y * 0.003) * 40;
                const oy = Math.cos(t * 0.8 + y * 0.004 + x * 0.002) * 30;
                const br = (Math.sin(t * 1.2 + x * 0.008 + y * 0.006) + 1) * 0.5;
                if (br > 0.55) {
                    const a = (br - 0.55) * 0.35;
                    const cx = x + ox, cy = y + oy, r = cs * 0.3 * (0.6 + br * 0.4);
                    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
                    g.addColorStop(0, `rgba(200,240,255,${a})`);
                    g.addColorStop(0.5, `rgba(180,220,255,${a * 0.4})`);
                    g.addColorStop(1, 'transparent');
                    ctx.fillStyle = g;
                    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
                }
            }
        }
        causticAnimId = requestAnimationFrame(drawCaustics);
    }
    drawCaustics();
}

function setupSeaScene() {
    seaAnimTimers.forEach(t => clearInterval(t));
    seaAnimTimers = [];

    // Bubbles
    const bc = document.getElementById('bubblesContainer');
    bc.innerHTML = '';
    for (let i = 0; i < 15; i++) {
        const b = document.createElement('div');
        b.className = 'bubble';
        const sz = 5 + Math.random() * 20;
        b.style.width = sz + 'px'; b.style.height = sz + 'px';
        b.style.left = Math.random() * 100 + '%';
        b.style.bottom = (Math.random() * 30) + '%';
        b.style.animationDuration = (4 + Math.random() * 6) + 's';
        b.style.animationDelay = Math.random() * 5 + 's';
        bc.appendChild(b);
    }

    // === Canvas Caustics ===
    initCaustics();

    // === Light Particles ===
    const particleTimer = setInterval(() => {
        if (currentPage !== 'sea-game') return;
        const scene = document.getElementById('seaScene');
        const p = document.createElement('div');
        p.className = 'sea-light-particle';
        const sz = 3 + Math.random() * 6;
        p.style.width = sz + 'px'; p.style.height = sz + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.bottom = Math.random() * 30 + '%';
        p.style.setProperty('--pdx', (Math.random() * 60 - 30) + 'px');
        const dur = 4 + Math.random() * 5;
        p.style.animation = `seaParticleFloat ${dur}s ease-out forwards`;
        scene.appendChild(p);
        setTimeout(() => p.remove(), dur * 1000);
    }, 400);
    seaAnimTimers.push(particleTimer);

    // === Swimming + floor creatures: pick 10-15 random from pool ===
    const sc = document.getElementById('seaCreaturesContainer');
    sc.innerHTML = '';
    const swimPool = SEA_ANIMALS.filter(a => a.type === 'swim' || a.type === 'seahorse' || a.type === 'jellyfish');
    const floorPool = SEA_ANIMALS.filter(a => a.type === 'floor');

    // Always include mermaid + pick 2-3 other floor creatures (excluding magic animals)
    const floorPicks = [SEA_ANIMALS.find(a => a.id === 'mermaid')];
    const regularFloor = floorPool.filter(a => a.id !== 'mermaid' && !MAGIC_IDS.includes(a.id));
    const otherFloor = shuffle([...regularFloor]);
    floorPicks.push(...otherFloor.slice(0, 2)); // mermaid + 2 floor = 3 floor creatures

    // Pick 8-12 swimmers randomly
    // Total non-treasure animals ≤ 10: ~5-6 swimmers + 3-4 floor + 1 magic
    const swimCount = 5 + Math.floor(Math.random() * 2);
    const swimPicks = shuffle([...swimPool]).slice(0, swimCount);

    // Spawn swimmers with staggered delays
    swimPicks.forEach((item, i) => {
        createSwimmer(item, sc, i * 1.5 + Math.random() * 3);
    });

    // Spawn floor creatures
    floorPicks.forEach(item => { if (item) createFloorCreature(item, sc); });

    // Respawn swimmers to keep 10-15 on screen
    const respawnTimer = setInterval(() => {
        if (currentPage !== 'sea-game') return;
        // Count current swimmers
        const currentSwimmers = sc.querySelectorAll('.sea-creature').length;
        const totalAnimals = sc.querySelectorAll('.sea-creature, .sea-floor-creature').length;
        if (totalAnimals < 10 && currentSwimmers < 7) {
            const item = swimPool[Math.floor(Math.random() * swimPool.length)];
            const { el, dur } = createSwimmer(item, sc, 0);
            setTimeout(() => { if (el.parentNode) el.remove(); }, dur * 1000 + 1000);
        }
    }, 4000);
    seaAnimTimers.push(respawnTimer);

    // Respawn floor creatures (mermaid changes direction, exclude magic animals)
    const floorTimer = setInterval(() => {
        if (currentPage !== 'sea-game') return;
        // Remove non-magic floor creatures only
        sc.querySelectorAll('.sea-floor-creature:not([data-magic])').forEach(el => el.remove());
        const newFloor = [SEA_ANIMALS.find(a => a.id === 'mermaid')];
        const others = shuffle([...regularFloor]);
        newFloor.push(...others.slice(0, 2 + Math.floor(Math.random() * 2)));
        newFloor.forEach(item => { if (item) createFloorCreature(item, sc); });
    }, 18000);
    seaAnimTimers.push(floorTimer);

    // Magic Animal: spawn 1 random magic animal after 20s delay, max 1 on screen
    const magicPool = SEA_ANIMALS.filter(a => MAGIC_IDS.includes(a.id));
    setTimeout(() => {
        if (currentPage !== 'sea-game') return;
        const ma = magicPool[Math.floor(Math.random() * magicPool.length)];
        const maEl = createFloorCreature(ma, sc);
        // Tag magic animals
        const lastChild = sc.querySelector('.sea-floor-creature:last-child');
        if (lastChild) lastChild.dataset.magic = '1';
    }, 20000);
    // Respawn magic animal: check every 10s, but only spawn if cooldown (30-60s) has passed
    let nextMagicSpawnAt = Date.now() + 20000; // first one at 20s
    const magicTimer = setInterval(() => {
        if (currentPage !== 'sea-game') return;
        const existing = sc.querySelector('.sea-floor-creature[data-magic]');
        if (!existing && Date.now() >= nextMagicSpawnAt) {
            const ma = magicPool[Math.floor(Math.random() * magicPool.length)];
            createFloorCreature(ma, sc);
            const lastChild = sc.querySelector('.sea-floor-creature:last-child');
            if (lastChild) lastChild.dataset.magic = '1';
            // Set next spawn cooldown: 30-60s from now
            nextMagicSpawnAt = Date.now() + 30000 + Math.random() * 30000;
        }
    }, 10000);
    seaAnimTimers.push(magicTimer);

    // === Treasures: max 5 on screen, refill after collection ===
    const fc = document.getElementById('seaFloorContainer');
    fc.innerHTML = '';
    // Spawn initial 5
    for (let i = 0; i < MAX_TREASURES_ON_SCREEN; i++) {
        spawnTreasure(fc);
    }

    // Periodically check and refill if treasures were collected
    if (treasureRefillTimer) clearInterval(treasureRefillTimer);
    treasureRefillTimer = setInterval(() => {
        if (currentPage !== 'sea-game') return;
        refillTreasures();
    }, 5000);
    seaAnimTimers.push(treasureRefillTimer);
}

let questionTimerId = null;
let questionTimeLeft = 0;

function startQuestionTimer(seconds) {
    clearQuestionTimer();
    questionTimeLeft = seconds;
    const timerEl = document.getElementById('seaQuestionTimer');
    const textEl = document.getElementById('seaTimerText');
    timerEl.style.display = 'flex';
    timerEl.classList.remove('warning');
    textEl.textContent = questionTimeLeft;

    questionTimerId = setInterval(() => {
        questionTimeLeft--;
        textEl.textContent = questionTimeLeft;
        if (questionTimeLeft <= 5) {
            timerEl.classList.add('warning');
        }
        if (questionTimeLeft <= 0) {
            clearQuestionTimer();
            onQuestionTimeout();
        }
    }, 1000);
}

function clearQuestionTimer() {

let pickTimerId = null;
let pickTimeLeft = 0;
let thawBatches = []; // arrays of elements to thaw at each batch
let thawIndex = 0;
let hasCollected = false; // whether child already collected 1 item

function checkSeaAnswer(picked) {
    if (seaPickMode || seaOptionsLocked) return;
    if (typeof picked !== 'number' || isNaN(picked)) return;

    clearQuestionTimer();
    lockSeaOptions();

    if (picked === seaQuestion.answer) {
        markSeaOption(picked, 'correct');

        bumpDailySolved();
        document.getElementById('sea-correct').textContent = seaCorrect;
        showFeedback('\u2b50 正确!');

        seaWrong++;
        document.getElementById('sea-wrong').textContent = seaWrong;
        showFeedback('\u274c ' + seaQuestion.text + ' = ' + seaQuestion.answer);

function enablePickMode() {
    seaPickMode = true;
    hasCollected = false;
    pickTimeLeft = 30;

    document.getElementById('seaPickHint').style.display = 'block';
    const timerEl = document.getElementById('seaQuestionTimer');
    const textEl = document.getElementById('seaTimerText');
    timerEl.style.display = 'flex';
    timerEl.classList.remove('warning');
    textEl.textContent = pickTimeLeft;

    // All items start frozen (collectible) - make them clickable
    // But legendaries (mermaid + magic animals) are only collectible if cooldown has passed
    const now = Date.now();
    const legendaryAvailable = now >= legendaryCollectibleAt;
    const scene = document.getElementById('seaScene');
    const allItems = [...scene.querySelectorAll('.sea-creature, .sea-floor-creature, .sea-floor-item')];
    allItems.forEach(el => {
        const isLegendary = LEGENDARY_IDS.includes(el.dataset.itemId);
        if (isLegendary && !legendaryAvailable) {
            // Legendary on cooldown: visible but NOT collectible
            return;
        }
        el.classList.add('sea-collectible');
        el.classList.remove('sea-thawed');
        el.style.cursor = 'pointer';
        el.addEventListener('click', onPickItem, { once: true });
    });

    // Prepare thaw batches: after 5s, thaw in random batches every 5s
    const shuffled = [...allItems].sort(() => Math.random() - 0.5);
    thawBatches = [];
    const batchCount = 5; // 5 batches over 25 seconds (5s to 30s)
    const perBatch = Math.ceil(shuffled.length / batchCount);
    for (let i = 0; i < batchCount; i++) {
        thawBatches.push(shuffled.slice(i * perBatch, (i + 1) * perBatch));
    }
    thawIndex = 0;

    // Start pick countdown
    pickTimerId = setInterval(() => {
        pickTimeLeft--;
        textEl.textContent = pickTimeLeft;

        if (pickTimeLeft <= 5) timerEl.classList.add('warning');

        // Thaw a batch at 25s, 20s, 15s, 10s, 5s remaining (i.e. at 5s, 10s, 15s, 20s, 25s elapsed)
        const elapsed = 30 - pickTimeLeft;
        if (elapsed >= 5 && elapsed % 5 === 0 && thawIndex < thawBatches.length) {
            const batch = thawBatches[thawIndex];
            batch.forEach(el => {
                el.classList.add('sea-thawed');
                el.classList.remove('sea-collectible');
                el.style.cursor = 'default';
                el.removeEventListener('click', onPickItem);
            });
            thawIndex++;
        }

        if (pickTimeLeft <= 0) {
            endPickMode();
        }
    }, 1000);
}

function endPickMode() {
    if (pickTimerId) { clearInterval(pickTimerId); pickTimerId = null; }
    seaPickMode = false;
    document.getElementById('seaPickHint').style.display = 'none';

    // Remove all collectible/thawed states
    const scene = document.getElementById('seaScene');
    scene.querySelectorAll('.sea-collectible, .sea-thawed').forEach(el => {
        el.classList.remove('sea-collectible', 'sea-thawed');
        el.style.cursor = 'default';
        el.removeEventListener('click', onPickItem);
    });

    clearQuestionTimer();
    setTimeout(() => nextSeaQuestion(), 500);
}

function disablePickMode() {
    if (pickTimerId) { clearInterval(pickTimerId); pickTimerId = null; }
    seaPickMode = false;
    document.getElementById('seaPickHint').style.display = 'none';
    const scene = document.getElementById('seaScene');
    scene.querySelectorAll('.sea-collectible, .sea-thawed').forEach(el => {
        el.classList.remove('sea-collectible', 'sea-thawed');
        el.style.cursor = 'default';
        el.removeEventListener('click', onPickItem);

    clearQuestionTimer();
}

function onPickItem(e) {
    if (hasCollected) return; // only 1 pick allowed
    const el = e.currentTarget;
    if (el.classList.contains('sea-thawed')) return; // already thawed
    const itemId = el.dataset.itemId;
    const itemName = el.dataset.itemName;
    const itemImg = el.dataset.itemImg;
    if (!itemId) return;

    hasCollected = true;

    // Fly-to-box animation
    const rect = el.getBoundingClientRect();
    const boxBtn = document.getElementById('treasureBoxBtn');
    const boxRect = boxBtn.getBoundingClientRect();
    const flyEl = document.createElement('div');
    flyEl.className = 'fly-to-box';
    flyEl.innerHTML = `<img src="${IMG}${itemImg}">`;
    flyEl.style.left = rect.left + rect.width/2 - 30 + 'px';
    flyEl.style.top = rect.top + rect.height/2 - 30 + 'px';
    document.body.appendChild(flyEl);
    requestAnimationFrame(() => {
        flyEl.style.left = boxRect.left + boxRect.width/2 - 15 + 'px';
        flyEl.style.top = boxRect.top + boxRect.height/2 - 15 + 'px';
        flyEl.classList.add('flying');
    });
    setTimeout(() => {
        flyEl.remove();
        boxBtn.style.animation = 'shake 0.4s';
        setTimeout(() => boxBtn.style.animation = '', 500);
    }, 850);

    el.style.transition = 'opacity 0.3s';
    el.style.opacity = '0';
    setTimeout(() => { if (el.parentNode) el.remove(); }, 400);

    setTreasureCooldown(itemId);

    // If a legendary was collected, set 30-60s cooldown before any legendary is collectible again
    if (LEGENDARY_IDS.includes(itemId)) {
        const cd = 30000 + Math.random() * 30000; // 30-60s
        legendaryCollectibleAt = Date.now() + cd;
    }

    treasureCollection.push({ id: itemId, name: itemName, img: itemImg, time: Date.now() });
    saveTreasures();
    updateTreasureBoxUI();
    showFeedback('\ud83c\udf81 ' + itemName + ' 收入囊中!');

    // After collecting, end pick mode and go to next question
    disablePickMode();
    setTimeout(() => nextSeaQuestion(), 1000);
}

    // Treasury Set 2
    ts2_1: [70, 110], ts2_2: [40, 80], ts2_3: [30, 60], ts2_4: [40, 70], ts2_5: [40, 70],
    ts2_6: [50, 90], ts2_7: [50, 80], ts2_8: [60, 100], ts2_9: [40, 70], ts2_10: [80, 130],
    // Treasury Set 3
    ts3_1: [70, 110], ts3_2: [40, 70], ts3_3: [30, 60], ts3_4: [30, 60], ts3_5: [40, 70],
    ts3_6: [50, 90], ts3_7: [50, 80], ts3_8: [20, 50], ts3_9: [40, 70], ts3_10: [80, 130],
};
// Default for any new item not in the table
const DEFAULT_PRICE = [20, 50];

function getItemPrice(itemId) {
    const range = PRICE_TABLE[itemId] || DEFAULT_PRICE;
    const total = treasureCollection.length;
    if (total === 0) return range[1]; // empty box = max price
    const count = treasureCollection.filter(t => t.id === itemId).length;
    const ratio = count / total; // 0 to 1
    // Higher ratio = lower price; threshold at 30%
    const t = Math.min(ratio / 0.3, 1);
    return Math.round(range[1] - (range[1] - range[0]) * t);
}

// ===== DAILY SETTLEMENT STATE (本地时间) =====
const DAILY_GOAL = 30;        // 每日答对题数目标
const TREASURE_LOSS_RATE = 0.10; // 未达标随机丢宝物比例
const CASH_DEFLATION = 0.10;     // 可投资金额每日通缩比例

let dailySolved = parseInt(localStorage.getItem('seaDailySolved') || '0');
let lastSettleDate = localStorage.getItem('seaLastSettleDate') || '';
let settleHistory = JSON.parse(localStorage.getItem('seaSettleHistory') || '[]');

    localStorage.setItem('seaDailySolved', dailySolved);

    localStorage.setItem('seaSettleHistory', JSON.stringify(settleHistory));
    scheduleCloudPush();

// 跟随系统本地时间,按本地日历日(00:00-23:59:59)划分"一天"
function getLocalDateStr(d) {
    d = d || new Date();
    return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
}

function localDateDiffDays(fromStr, toStr) {
    // 'YYYY-MM-DDT00:00:00'(无时区后缀)按本地时间解析
    const a = new Date(fromStr + 'T00:00:00').getTime();
    const b = new Date(toStr + 'T00:00:00').getTime();
    return Math.round((b - a) / 86400000);
}

// 增加今日答对计数(仅闯关模式调用)
function bumpDailySolved() {
    const today = getLocalDateStr();
    // 如果跨日了,先结算(理论上 page load 已结算,但防御性处理)
    if (lastSettleDate && lastSettleDate !== today) {
        runDailySettlement(/*silent=*/true);
    }
    dailySolved++;
    saveDaily();
}

// 核心结算函数:从 lastSettleDate 一直补扣到"昨天"
function runDailySettlement(silent) {
    const today = getLocalDateStr();
    if (!lastSettleDate) {
        // 首次进入:仅记录今天为起点,不结算
        lastSettleDate = today;
        saveDaily();
        return null;
    }
    if (lastSettleDate === today) return null; // 今天已经结算过

    let totalLost = []; // 累计丢失的宝物列表
    let cashBefore = cashBalance;

    // 按本地日 loop,从 lastSettleDate 下一天开始,直到 today(不含 today)
    let cursor = lastSettleDate;
    const daysToSettle = localDateDiffDays(lastSettleDate, today);
    for (let i = 0; i < daysToSettle; i++) {
        // 计算 cursor 当天的状况
        // 只有 cursor === lastSettleDate 这一天用真实 dailySolved,
        // 之后的"空过日"答对数都是 0
        const solvedThatDay = (i === 0) ? dailySolved : 0;
        const lostThisDay = [];

        // 规则 1: 答对 < 30 → 随机丢 floor(总数 * 10%)
        if (solvedThatDay < DAILY_GOAL && treasureCollection.length > 0) {
            const lossCount = Math.floor(treasureCollection.length * TREASURE_LOSS_RATE);
            for (let k = 0; k < lossCount && treasureCollection.length > 0; k++) {
                const idx = Math.floor(Math.random() * treasureCollection.length);
                lostThisDay.push(treasureCollection[idx]);
                treasureCollection.splice(idx, 1);
            }
        }

        // 规则 2: 可投资金额无条件 -10% (向下取整)
        const cashBeforeDay = cashBalance;
        cashBalance = Math.floor(cashBalance * (1 - CASH_DEFLATION));

        // cursor 当天对应的"日期" = lastSettleDate + i 天
        const dayDate = new Date(lastSettleDate + 'T00:00:00');
        dayDate.setDate(dayDate.getDate() + i);
        const dayStr = getLocalDateStr(dayDate);

        settleHistory.push({
            date: dayStr,
            solved: solvedThatDay,
            lostTreasures: lostThisDay.map(t => ({ id: t.id, name: t.name, img: t.img })),
            cashBefore: cashBeforeDay,
            cashAfter: cashBalance,
        });
        totalLost = totalLost.concat(lostThisDay);
    }

    // 限制历史长度,避免无限增长
    if (settleHistory.length > 365) settleHistory = settleHistory.slice(-365);

    // 进入今天,重置今日答对数
    dailySolved = 0;
    lastSettleDate = today;
    saveDaily();
    saveTreasures();
    saveFinance();
    updateTreasureBoxUI();

    const result = {
        lost: totalLost,
        cashBefore: cashBefore,
        cashAfter: cashBalance,
        cashLoss: cashBefore - cashBalance,
        daysSettled: daysToSettle,
    };
    if (!silent && (totalLost.length > 0 || result.cashLoss > 0)) {
        showSettlementModal(result);
    }
    return result;
}

// Fetch latest trade price via intraday 1min, fallback to GLOBAL_QUOTE
async function fetchOneStock(symbol) {
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        // Try intraday first for latest trade price
        const res = await fetch(
            `https://www.alphavantage.co/query?function=TIME_SERIES_INTRADAY&symbol=${symbol}&interval=1min&outputsize=compact&apikey=${AV_KEY}`,
            { signal: controller.signal }
        );
        clearTimeout(timeout);
        if (res.ok) {
            const data = await res.json();
            const ts = data['Time Series (1min)'];
            if (ts) {
                const latestKey = Object.keys(ts).sort().pop();
                if (latestKey) {
                    stockPrices[symbol] = Math.round(parseFloat(ts[latestKey]['4. close']) * 100) / 100;
                    stockStatus[symbol] = 'ok';
                    return true;
                }
            }
            // Fallback: try GLOBAL_QUOTE in same response cycle
            const controller2 = new AbortController();
            const timeout2 = setTimeout(() => controller2.abort(), 15000);
            const res2 = await fetch(
                `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${AV_KEY}`,
                { signal: controller2.signal }
            );
            clearTimeout(timeout2);
            if (res2.ok) {
                const data2 = await res2.json();
                const quote = data2['Global Quote'];
                if (quote && quote['05. price']) {
                    stockPrices[symbol] = Math.round(parseFloat(quote['05. price']) * 100) / 100;
                    stockStatus[symbol] = 'ok';
                    return true;
                }
            }
        }
    } catch(e) {}
    return false;
}

// Fetch all stock prices with auto-retry for failures
async function fetchStockPrices() {
    if (stockPricesLoading) return;
    stockPricesLoading = true;

    // Mark all as loading
    STOCKS.forEach(s => { stockStatus[s.symbol] = 'loading'; });
    renderStockPriceStatus();

    // First pass: fetch all
    const failed = [];
    for (const stock of STOCKS) {
        const ok = await fetchOneStock(stock.symbol);
        if (ok) {
            renderStockPriceStatus(); // update UI immediately for this stock
        } else {
            failed.push(stock.symbol);
        }
        await new Promise(r => setTimeout(r, 200));
    }

    // Auto-retry failed ones (up to 2 retries, with backoff)
    if (failed.length > 0) {
        for (let retry = 0; retry < 2; retry++) {
            await new Promise(r => setTimeout(r, 2000)); // wait 2s before retry
            const stillFailed = [];
            for (const sym of failed) {
                if (stockStatus[sym] === 'ok') continue;
                const ok = await fetchOneStock(sym);
                if (ok) {
                    renderStockPriceStatus();
                } else {
                    stillFailed.push(sym);
                }
                await new Promise(r => setTimeout(r, 300));
            }
            failed.length = 0;
            failed.push(...stillFailed);
            if (failed.length === 0) break;
        }
    }

    // After retries, mark remaining as failed
    failed.forEach(sym => { stockStatus[sym] = 'failed'; });

    // Fill any never-fetched with fallback (for first load)
    STOCKS.forEach(s => {
        if (!stockPrices[s.symbol]) stockPrices[s.symbol] = FALLBACK_PRICES[s.symbol] || 100;
    });

    stockPricesLoading = false;
    localStorage.setItem('seaStockPrices', JSON.stringify(stockPrices));
    localStorage.setItem('seaStockPricesTime', Date.now());
    renderStockPriceStatus();
    updateCashDisplay();
}

            priceEl.innerHTML = '<span style="color:rgba(255,255,255,0.5)">&#8987; 刷新中...</span>';

}

const SAVINGS_RATE = 0.05; // 5% annual, daily compounding
const DAILY_RATE = SAVINGS_RATE / 365;

// Daily compound interest: principal * (1 + r/365)^days - principal
function calcCompoundInterest(principal, days) {
    return principal * Math.pow(1 + DAILY_RATE, days) - principal;
}
// Current MtM value of a savings position (principal + accrued compound interest)
function savingsMtM(s) {
    const days = Math.max(0, (Date.now() - s.buyTime) / 86400000);
    return s.amount + calcCompoundInterest(s.amount, days);
}
// Stock MtM
function stockMtM(h) {
    const currentPrice = stockPrices[h.symbol] || h.buyPrice;
    const shares = h.amount / h.buyPrice;
    return shares * currentPrice;
}

// Compute all summary values
function computeFinancials() {
    let unrealizedSavings = 0, unrealizedStocks = 0, totalInvestMtM = 0;
    const openSavings = investments.filter(i => i.type === 'savings' && !i.soldAt);
    const openStocks = investments.filter(i => i.type === 'stock' && !i.soldAt);

    openSavings.forEach(s => {
        const mtm = savingsMtM(s);
        totalInvestMtM += mtm;
        unrealizedSavings += mtm - s.amount; // accrued compound interest
    });
    openStocks.forEach(h => {
        const mtm = stockMtM(h);
        totalInvestMtM += mtm;
        unrealizedStocks += mtm - h.amount; // MtM - cost
    });

    // Total P&L = unrealized (open positions) + realized (withdrawable)
    const totalPnl = unrealizedSavings + unrealizedStocks + withdrawable;
    // Total value = investable + open positions MtM + withdrawable
    const totalValue = cashBalance + totalInvestMtM + withdrawable;
    return { totalValue, totalPnl, unrealizedSavings, unrealizedStocks };
}

function updateCashDisplay() {
    const f = computeFinancials();
    const tvEl = document.getElementById('totalValueDisplay');
    const tpEl = document.getElementById('totalPnlDisplay');
    const cd = document.getElementById('cashDisplay');
    const wd = document.getElementById('withdrawableDisplay');
    if (tvEl) tvEl.textContent = Math.floor(f.totalValue);
    if (tpEl) {
        const pnl = Math.floor(f.totalPnl);
        const sign = pnl >= 0 ? '+' : '';
        tpEl.textContent = '\ud83d\udcc8 总P&L: ' + sign + '$' + pnl;
        tpEl.style.color = pnl >= 0 ? '#4CAF50' : '#ff6b6b';
    }
    if (cd) cd.textContent = Math.floor(cashBalance);
    if (wd) wd.textContent = Math.floor(withdrawable);
}

// Partial or full withdrawal from savings
// Proportional: if withdrawing W from principal P, realized interest = totalInterest * (W/P)
function withdrawSavings(holdingIndex) {
    const openSavings = investments.filter(i => i.type === 'savings' && !i.soldAt);
    const s = openSavings[holdingIndex];
    if (!s) return;

    const partialInput = document.getElementById('partialW_' + holdingIndex);
    let withdrawPrincipal = partialInput ? Math.floor(parseFloat(partialInput.value)) : 0;

    // If no partial amount or invalid, withdraw all
    if (!withdrawPrincipal || withdrawPrincipal <= 0 || withdrawPrincipal > s.amount) {
        withdrawPrincipal = s.amount;
    }

    const days = Math.max(0, (Date.now() - s.buyTime) / 86400000);
    const totalInterest = calcCompoundInterest(s.amount, days);
    const proportion = withdrawPrincipal / s.amount;
    const realizedInterest = Math.floor(totalInterest * proportion);
    const payout = withdrawPrincipal + realizedInterest;

    if (withdrawPrincipal === s.amount) {
        // Full withdrawal - close position
        s.soldAt = Date.now();
        s.sellAmount = payout;
        s.pnl = realizedInterest;
        investHistory.push({ ...s, symbol: '存款' });
    } else {
        // Partial withdrawal - reduce principal, log the partial
        s.amount -= withdrawPrincipal;
        investHistory.push({
            type: 'savings', symbol: '存款(部分取出)',
            amount: withdrawPrincipal, buyTime: s.buyTime,
            soldAt: Date.now(), sellAmount: payout, pnl: realizedInterest
        });
    }

    // Principal → back to investable, interest → withdrawable
    cashBalance += withdrawPrincipal;
    withdrawable += realizedInterest;
    saveAll(); updateCashDisplay(); renderInvestTab();
    showFeedback('取出 本金$' + withdrawPrincipal + ' + 利息$' + realizedInterest);
}

async function buyStock(symbol) {
    const input = document.getElementById('buy_' + symbol);
    const amount = Math.floor(parseFloat(input.value));
    if (!amount || amount <= 0 || amount > cashBalance) { showFeedback('余额不足!'); return; }
    await fetchStockPrices();
    const price = stockPrices[symbol];
    if (!price) { showFeedback('无法获取股价'); return; }
    cashBalance -= amount;
    investments.push({ type: 'stock', symbol, amount, buyPrice: price, buyTime: Date.now() });
    saveAll(); updateCashDisplay(); renderInvestTab();
    showFeedback('买入 ' + symbol + ' $' + amount + ' @ $' + price);
}

async function sellStock(symbol, holdingIndex) {
    await fetchStockPrices();
    const holdings = investments.filter(i => i.type === 'stock' && i.symbol === symbol && !i.soldAt);
    const h = holdings[holdingIndex];
    if (!h) return;
    const currentPrice = stockPrices[symbol] || h.buyPrice;
    const shares = h.amount / h.buyPrice;
    const sellAmount = Math.round(shares * currentPrice);
    const pnl = sellAmount - h.amount;
    h.soldAt = Date.now(); h.sellPrice = currentPrice; h.sellAmount = sellAmount; h.pnl = pnl;
    // Full proceeds → investable amount
    cashBalance += sellAmount;
    // Only profit goes to withdrawable (loss already reflected in smaller sellAmount)
    if (pnl > 0) withdrawable += pnl;
    investHistory.push({ ...h });
    saveAll(); updateCashDisplay(); renderInvestTab();
    const sign = pnl >= 0 ? '+' : '';
    showFeedback(symbol + ' 卖出 $' + sellAmount + ' (P&L: ' + sign + '$' + pnl + ')');
}

}

// 统一的存档序列化 (导出 + 云同步共用)
function buildSaveObject() {
    return {
        version: 2,
        exportTime: new Date().toISOString(),
        treasures: treasureCollection,
        cash: cashBalance,
        withdrawable: withdrawable,
        investments: investments,
        investHistory: investHistory,
        stockPrices: stockPrices,
        dailySolved: dailySolved,
        lastSettleDate: lastSettleDate,
        settleHistory: settleHistory,
    };
}
function applySaveObject(data) {
    if (data.treasures) { treasureCollection = data.treasures; saveTreasures(); }
    if (data.cash !== undefined) cashBalance = data.cash;
    if (data.withdrawable !== undefined) withdrawable = data.withdrawable;
    if (data.investments) investments = data.investments;
    if (data.investHistory) investHistory = data.investHistory;
    if (data.stockPrices) stockPrices = data.stockPrices;
    if (data.dailySolved !== undefined) dailySolved = data.dailySolved;
    if (data.lastSettleDate) lastSettleDate = data.lastSettleDate;
    if (data.settleHistory) settleHistory = data.settleHistory;
    saveFinance();
    saveDaily();
    updateTreasureBoxUI();
    updateCashDisplay();
    renderTreasureGrid();
}

function exportAllData() {
    const blob = new Blob([JSON.stringify(buildSaveObject(), null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `sea_treasure_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showFeedback('数据已导出!');
}

function importAllData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            applySaveObject(JSON.parse(e.target.result));
            showFeedback('数据导入成功!');
            scheduleCloudPush(); // 导入后同步到云端
        } catch(err) {
            showFeedback('导入失败: 文件格式错误');
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function localLooksEmpty() {
    return treasureCollection.length === 0 && investments.length === 0
        && (cashBalance || 0) === 0 && (withdrawable || 0) === 0;
}

// 启动时同步 —— 安全规则: 空数据永远不能覆盖非空的一方
async function cloudSyncOnLoad() {
    if (!cloudEnabled()) return;
    setCloudStatus('☁️ 检查云端存档...', '#FFD700');
    try {
        const cloud = await cloudPull();
        const localEmpty = localLooksEmpty();
        // 1) 云端没有或为空白
        if (saveLooksEmpty(cloud)) {
            if (!localEmpty) { await cloudPush(); setCloudStatus('✅ 已用本机存档初始化云端', '#43e97b'); }
            else setCloudStatus('云端与本机均为空白', 'rgba(255,255,255,0.55)');
            return;
        }
        // 2) 云端有有效数据, 本地空白 → 直接采用云端 (无视版本号, 防止残留版本号误判)
        if (localEmpty) {
            applyingCloud = true;
            applySaveObject(cloud);
            applyingCloud = false;
            seaSyncVersion = cloud._v || Date.now();
            localStorage.setItem('seaSyncVersion', seaSyncVersion);
            setCloudStatus('✅ 已载入云端存档', '#43e97b');
            return;
        }
        // 3) 两边都有数据 → 版本新者为准
        const cloudV = cloud._v || 0;
        if (cloudV > seaSyncVersion) {
            applyingCloud = true;
            applySaveObject(cloud);
            applyingCloud = false;
            seaSyncVersion = cloudV;
            localStorage.setItem('seaSyncVersion', seaSyncVersion);
            setCloudStatus('✅ 已载入云端最新存档', '#43e97b');
        } else if (seaSyncVersion > cloudV) {
            await cloudPush();
        } else {
            setCloudStatus('✅ 已是最新「' + syncCode + '」', '#43e97b');
        }
    } catch (e) {
        setCloudStatus('⚠️ 连接云端失败 (离线也可玩)', '#ff6b6b');
    }
}

// 手动: 强制把本机存档上传覆盖云端 (本机有进度想推上去时用)
async function cloudPushManual() {
    if (!cloudEnabled()) { setCloudStatus('请先设置同步码', '#ff6b6b'); return; }
    const ok = confirm('把本机存档(' + treasureCollection.length + ' 件宝物, $' + cashBalance + ')上传,覆盖云端「' + syncCode + '」?');
    if (!ok) return;
    seaSyncVersion = Date.now();
    localStorage.setItem('seaSyncVersion', seaSyncVersion);
    await cloudPush();
}

// 用户在面板里设置/切换同步码
async function applySyncCode() {
    if (!cloudConfigured()) { setCloudStatus('⚠️ 未配置 Supabase', '#ff6b6b'); return; }
    const input = document.getElementById('syncCodeInput');
    const code = (input.value || '').trim();
    if (!code) { setCloudStatus('请输入同步码', '#ff6b6b'); return; }
    syncCode = code;
    localStorage.setItem('seaSyncCode', syncCode);
    try {
        setCloudStatus('☁️ 连接中...', '#FFD700');
        const cloud = await cloudPull();
        if (cloud) {
            applyingCloud = true;
            applySaveObject(cloud);
            applyingCloud = false;
            seaSyncVersion = cloud._v || Date.now();
            localStorage.setItem('seaSyncVersion', seaSyncVersion);
            setCloudStatus('✅ 已载入「' + syncCode + '」的云端存档', '#43e97b');
        } else {
            seaSyncVersion = Date.now();
            localStorage.setItem('seaSyncVersion', seaSyncVersion);
            await cloudPush();
            setCloudStatus('✅ 已创建并上传到「' + syncCode + '」', '#43e97b');
        }
    } catch (e) {
        setCloudStatus('⚠️ 连接失败, 请检查网络/配置', '#ff6b6b');
    }
}

// 手动强制从云端拉取 (覆盖本地)
async function cloudPullManual() {
    if (!cloudEnabled()) { setCloudStatus('请先设置同步码', '#ff6b6b'); return; }
    try {
        setCloudStatus('☁️ 拉取中...', '#FFD700');
        const cloud = await cloudPull();
        if (!cloud) { setCloudStatus('云端暂无此同步码的存档', '#ff6b6b'); return; }
        applyingCloud = true;
        applySaveObject(cloud);
        applyingCloud = false;
        seaSyncVersion = cloud._v || Date.now();
        localStorage.setItem('seaSyncVersion', seaSyncVersion);
        setCloudStatus('✅ 已拉取云端存档', '#43e97b');
    } catch (e) {
        setCloudStatus('⚠️ 拉取失败', '#ff6b6b');
    }
}

// 打开面板时刷新同步码 UI
function refreshCloudUI() {
    const input = document.getElementById('syncCodeInput');
    if (input && !input.value) input.value = syncCode;
    if (!cloudConfigured()) { setCloudStatus('未配置云同步 (仅本机存档)', 'rgba(255,255,255,0.45)'); return; }
    if (!syncCode) { setCloudStatus('输入同步码即可跨设备同步', 'rgba(255,255,255,0.55)'); return; }
    setCloudStatus('当前同步码「' + syncCode + '」', 'rgba(255,255,255,0.7)');
}

// Pause/resume timers when treasure modal opens/closes
let pausedQuestionTimer = false;
let pausedPickTimer = false;

function pauseSeaTimers() {
    if (questionTimerId) { clearInterval(questionTimerId); questionTimerId = null; pausedQuestionTimer = true; }
    if (pickTimerId) { clearInterval(pickTimerId); pickTimerId = null; pausedPickTimer = true; }
}

function resumeSeaTimers() {
    if (pausedQuestionTimer && questionTimeLeft > 0 && !seaPickMode) {
        pausedQuestionTimer = false;
        const timerEl = document.getElementById('seaQuestionTimer');
        const textEl = document.getElementById('seaTimerText');
        timerEl.style.display = 'flex';
        questionTimerId = setInterval(() => {
            questionTimeLeft--;
            textEl.textContent = questionTimeLeft;
            if (questionTimeLeft <= 5) timerEl.classList.add('warning');
            if (questionTimeLeft <= 0) { clearQuestionTimer(); onQuestionTimeout(); }
        }, 1000);
    }
    if (pausedPickTimer && pickTimeLeft > 0 && seaPickMode) {
        pausedPickTimer = false;
        const timerEl = document.getElementById('seaQuestionTimer');
        const textEl = document.getElementById('seaTimerText');
        timerEl.style.display = 'flex';
        pickTimerId = setInterval(() => {
            pickTimeLeft--;
            textEl.textContent = pickTimeLeft;
            if (pickTimeLeft <= 5) timerEl.classList.add('warning');
            const elapsed = 30 - pickTimeLeft;
            if (elapsed >= 5 && elapsed % 5 === 0 && thawIndex < thawBatches.length) {
                thawBatches[thawIndex].forEach(el => {
                    el.classList.add('sea-thawed'); el.classList.remove('sea-collectible');
                    el.style.cursor = 'default'; el.removeEventListener('click', onPickItem);
                });
                thawIndex++;
            }
            if (pickTimeLeft <= 0) endPickMode();
        }, 1000);
    }
}

function openTreasureModal() {
    pauseSeaTimers();
    updateCashDisplay();
    switchTab('items');
    document.getElementById('treasureModal').classList.add('show');
    refreshCloudUI();
    fetchStockPrices();
}

function closeTreasureModal() {
    document.getElementById('treasureModal').classList.remove('show');
    resumeSeaTimers();
}

// ===== KEYBOARD (可选: 桌面端按 1-5 选第 N 个选项) =====
document.addEventListener('keydown', (e) => {
    if (currentPage !== 'sea-game' || seaPickMode || seaOptionsLocked) return;
    if (document.getElementById('treasureModal').classList.contains('show')) return;
    const n = parseInt(e.key);
    if (n >= 1 && n <= 5) {
        const btns = document.querySelectorAll('#seaOptions .sea-opt');
        if (btns[n - 1]) checkSeaAnswer(parseInt(btns[n - 1].dataset.val));
    }
});

document.getElementById('treasureModal').addEventListener('click', function(e) { if(e.target===this) closeTreasureModal(); });
document.getElementById('withdrawDialog').addEventListener('click', function(e) { if(e.target===this) this.classList.remove('show'); });
